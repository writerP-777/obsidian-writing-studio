name: Auto-approve

on: pull_request

permissions: {}

jobs:
  auto-approve:
    permissions:
      pull-requests: write
    runs-on: ubuntu-latest
    if: github.actor == 'writerP-777' || github.actor == 'dependabot[bot]'
    steps:
      - name: Auto-approve PR
        uses: hmarr/auto-approve-action@f0939ea97e9205ef24d872e76833fa908a770363 # v4.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
